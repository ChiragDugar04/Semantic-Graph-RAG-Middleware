# ============================================================
# SEMANTIC GRAPH SCHEMA
# Defines the knowledge graph of database entities and their
# relationships. This is the single source of truth for the
# SemanticGraph class in middleware/semantic_graph.py
#
# To add a new entity:
#   1. Add a node entry below
#   2. Add edge entries describing its relationships
#   3. Zero Python changes required
# ============================================================

nodes:

  Employee:
    table: employees
    alias: e
    display_name: "Employee"
    # Natural-language words that trigger detection of this entity in user questions.
    # Read by entity_extractor._get_schema_keywords() — add new synonyms here, no Python change needed.
    trigger_words:
      - employee
      - employees
      - staff
      - worker
      - workers
      - person
      - people
      - who
      - member
    # Columns that can appear in SELECT
    selectable_columns:
      - column: name
        alias: employee_name
        label: "Employee Name"
      - column: role
        alias: employee_role
        label: "Role"
      - column: salary
        alias: salary
        label: "Salary"
        is_currency: true
      - column: hire_date
        alias: hire_date
        label: "Hire Date"
        default_hidden: true
      - column: email
        alias: email
        label: "Email"
        default_hidden: true
    # Columns that can appear in WHERE filters
    filterable_columns:
      name:
        match_type: like        # uses LIKE %value%
        sql_column: e.name
        is_named_scope: true    # T2-B: 'Alan Turing salary' wants a record, not COUNT(*)
      role:
        match_type: like
        sql_column: e.role
        # disambiguation_note: read by _build_schema_context() → emits DISAMBIGUATION section.
        # Prevents "in Marketing" / "in Sales" from being mistaken for a role filter.
        disambiguation_note: "job title queries only (e.g. Senior Engineer, Analyst). For team/group membership use department_name."
      salary:
        match_type: exact
        sql_column: e.salary
    # T1-E: occupational suffixes used by Phase 2 of _extract_named_values to
    # distinguish role titles (Senior Engineer) from person names (Leslie Knope).
    # A Title-Case candidate whose last word matches a suffix → employee_role.
    # To add a new role pattern, append the last word here — no Python change needed.
    role_suffixes:
      - engineer
      - manager
      - analyst
      - coordinator
      - director
      - specialist
      - representative
      - advisor
      - consultant
      - developer
      - architect
      - lead
      - officer
      - executive
      - associate
      - technician
      - administrator
      - supervisor
      - copywriter
      - strategist
      - liaison
    # The primary key used in JOINs
    primary_key: id
    primary_key_sql: e.id
    # T1-D: node-level filter supplements — apply whenever Employee is in the path.
    # reports_to_name fires unconditionally on any Employee path.
    # department_name subquery fires only when Department is NOT also in the path
    # (if Department IS in path, its own filterable_column generates the filter key).
    filter_supplements:
      reports_to_name:
        sql: "e.department_id IN (SELECT d.id FROM departments d INNER JOIN employees mgr ON d.manager_id = mgr.id WHERE mgr.name LIKE %(reports_to_name)s)"
        match: subquery
        exclude_when_node_in_path: []          # always active on Employee paths
        # semantic_signals: phrases that indicate THIS key is correct (not manager_name/department_name).
        # Read by _build_schema_context() → emits CROSS-TABLE KEY USAGE section in prompt.
        # Add new phrasing variants here; zero Python changes required.
        semantic_signals:
          - "X's team"
          - "team of X"
          - "under X"
          - "who reports to X"
          - "direct reports of X"
          - "everyone under X"
          - "people under X"
          - "reports to X"
      department_name:
        sql: "e.department_id IN (SELECT id FROM departments WHERE name LIKE %(department_name)s)"
        match: subquery
        exclude_when_node_in_path: [Department] # suppressed when Department already in path
        semantic_signals:
          - "employees in"
          - "people in"
          - "staff in"
          - "workers in"

  Department:
    table: departments
    alias: d
    display_name: "Department"
    trigger_words:
      - department
      - departments
      - dept
      - team
      - division
      - group
    # multi_entity_triggers: phrases that signal the question is asking WHICH department/team
    # an employee belongs to — both Employee AND Department must be in entities[].
    # Read by _build_schema_context() → emits a binding MULTI-ENTITY RULE in the prompt.
    # Add new membership-query phrasings here; zero Python changes required.
    multi_entity_triggers:
      - "which department"
      - "what department"
      - "which team"
      - "what team"
      - "belong to"
      - "belongs to"
      - "is in which"
      - "is on which"
      - "in which department"
      - "in which team"
    selectable_columns:
      - column: name
        alias: department_name
        label: "Department Name"
      - column: budget
        alias: budget
        label: "Budget"
        is_currency: true
      - column: location
        alias: location
        label: "Location"
        default_hidden: true
    filterable_columns:
      name:
        match_type: like
        sql_column: d.name
        is_named_scope: true    # T2-B: named dept scope — 'headcount in Engineering' wants records
      budget:
        match_type: exact
        sql_column: d.budget
      location:
        match_type: like
        sql_column: d.location
    primary_key: id
    primary_key_sql: d.id

  Product:
    table: products
    alias: p
    display_name: "Product"
    # D1: category words (electronics, furniture, etc.) must be here so that
    # category-only queries ("Show me all electronics") fire Product detection
    # without needing the LLM fallback. Add new category synonyms here.
    trigger_words:
      - product
      - products
      - item
      - items
      - stock
      - inventory
      - unit
      - units
      - electronics
      - electronic
      - furniture
      - office supply
      - office supplies
      - supply
      - supplies
    selectable_columns:
      - column: name
        alias: product_name
        label: "Product Name"
      - column: category
        alias: category
        label: "Category"
      - column: price
        alias: price
        label: "Price"
        is_currency: true
      - column: stock_quantity
        alias: stock_quantity
        label: "Stock"
      - column: supplier
        alias: supplier
        label: "Supplier"
        default_hidden: true
    filterable_columns:
      name:
        match_type: like
        sql_column: p.name
        is_named_scope: true    # T2-B: named product scope — 'units of Webcam HD' wants that product
      category:
        match_type: exact
        sql_column: p.category
        is_named_scope: true    # T2-B: named category scope — 'total stock of electronics' wants the list
        # T1-B: valid_values drives category filter extraction in entity_extractor.py Phase 0.
        # To add a new product category: add a new entry here with its canonical DB value
        # and any lowercase synonyms users might type. Zero Python changes required.
        # canonical must match the exact string stored in products.category in the database.
        valid_values:
          - canonical: "Electronics"
            synonyms: [electronics, electronic]
          - canonical: "Furniture"
            synonyms: [furniture]
          - canonical: "Office Supply"
            synonyms: [office supply, office supplies, supply, supplies]
      price:
        match_type: exact
        sql_column: p.price
      supplier:
        match_type: like
        sql_column: p.supplier
        is_named_scope: true    # T2-B: named supplier scope — 'total value from TechSupply' wants records
    primary_key: id
    primary_key_sql: p.id

  Order:
    table: orders
    alias: o
    display_name: "Order"
    trigger_words:
      - order
      - orders
      - purchase
      - purchases
      - bought
      - ordered
    selectable_columns:
      - column: id
        alias: order_id
        label: "Order ID"
      - column: quantity
        alias: quantity
        label: "Quantity"
      - column: order_date
        alias: order_date
        label: "Order Date"
      - column: status
        alias: status
        label: "Status"
    filterable_columns:
      status:
        match_type: exact
        sql_column: o.status
        # T1-C: enum_values drives order status extraction in entity_extractor.py Phase 0.
        # canonical must match the exact ENUM value in schema.sql orders.status.
        # To add a new order status (e.g. "returned"), add an entry here — zero Python changes.
        enum_values:
          - canonical: "pending"
            synonyms: [pending]
          - canonical: "processing"
            synonyms: [processing]
          - canonical: "shipped"
            synonyms: [shipped]
          - canonical: "delivered"
            synonyms: [delivered]
          - canonical: "cancelled"
            synonyms: [cancelled, canceled]
          - canonical: "active"
            synonyms: [active]
          - canonical: "completed"
            synonyms: [completed, complete]
      order_date:
        match_type: exact
        sql_column: o.order_date
    primary_key: id
    primary_key_sql: o.id

  Project:
    table: projects
    alias: proj
    display_name: "Project"
    trigger_words:
      - project
      - projects
      - initiative
      - initiatives
      - program
      - programs
    selectable_columns:
      - column: name
        alias: project_name
        label: "Project Name"
      - column: description
        alias: description
        label: "Description"
        default_hidden: true
      - column: budget
        alias: project_budget
        label: "Budget"
        is_currency: true
      - column: status
        alias: project_status
        label: "Status"
      - column: start_date
        alias: start_date
        label: "Start Date"
      - column: end_date
        alias: end_date
        label: "End Date"
      - column: manager_id
        alias: manager_id_raw
        label: "Manager ID"
        is_hidden: true
    filterable_columns:
      name:
        match_type: like
        sql_column: proj.name
        is_named_scope: true    # T2-B: named project scope — 'budget of Platform Migration' wants that record
      status:
        match_type: exact
        sql_column: proj.status
        # T1-C: enum_values drives project status extraction in entity_extractor.py Phase 0.
        # canonical must match the exact ENUM value in schema.sql projects.status.
        # To add a new project status (e.g. "archived"), add an entry here — zero Python changes.
        enum_values:
          - canonical: "planning"
            synonyms: [planning, planned]
          - canonical: "active"
            synonyms: [active]
          - canonical: "completed"
            synonyms: [completed, complete]
          - canonical: "on_hold"
            synonyms: [on_hold, "on hold", paused]
    primary_key: id
    primary_key_sql: proj.id


# ============================================================
# EDGES — Relationships between entities
#
# Each edge defines:
#   from_node     : source entity
#   to_node       : target entity
#   relation      : human-readable relationship label
#   join_type     : INNER or LEFT
#   join_condition: the ON clause (using table aliases from nodes)
#   junction_table: (optional) for many-to-many via a bridge table
#   junction_alias: alias for the junction table in SQL
#   notes         : explanation for developers
# ============================================================

edges:

  - from_node: Employee
    to_node: Department
    relation: works_in
    join_type: INNER
    join_condition: "e.department_id = d.id"
    notes: "An employee belongs to exactly one department"

  - from_node: Department
    to_node: Employee
    relation: managed_by
    join_type: LEFT
    join_condition: "d.manager_id = e.id"
    notes: "A department has one manager (an employee). Use alias mgr for manager employee."
    manager_join: true   # flag: JOIN employees twice, second with alias 'mgr'

  - from_node: Employee
    to_node: Project
    relation: assigned_to
    join_type: INNER
    junction_table: project_assignments
    junction_alias: pa
    join_condition: "e.id = pa.employee_id AND pa.project_id = proj.id"
    extra_select:
      - "pa.role_on_project AS assignment_role"
    notes: "Many-to-many via project_assignments junction table"
    # T1-D: cross-table filters that apply when this edge is traversed (Project in path).
    filter_supplements:
      manager_name:
        sql: "proj.manager_id IN (SELECT id FROM employees WHERE name LIKE %(manager_name)s)"
        match: subquery
        # semantic_signals: phrases that mean "the named person manages a project"
        # Distinguishes manager_name from reports_to_name (org-chart) at prompt time.
        semantic_signals:
          - "managed by X"
          - "X is managing"
          - "running the"
          - "who manages"
          - "who is running"
          - "X manages"
          - "managing"
      project_department:
        sql: "proj.department_id IN (SELECT id FROM departments WHERE name LIKE %(project_department)s)"
        match: subquery

  - from_node: Project
    to_node: Employee
    relation: managed_by_employee
    join_type: LEFT
    join_condition: "proj.manager_id = mgr.id"
    notes: "A project has one manager (an employee). Uses alias 'mgr' to avoid collision with Employee alias 'e' when both tables are joined. pipeline.py and graph_query_builder.py inject this as: LEFT JOIN employees mgr ON mgr.id = proj.manager_id"

  - from_node: Project
    to_node: Department
    relation: owned_by
    join_type: INNER
    join_condition: "proj.department_id = d.id"
    notes: "A project is owned by a primary department"

  - from_node: Department
    to_node: Project
    relation: has_projects
    join_type: INNER
    join_condition: "d.id = proj.department_id"
    notes: "A department owns multiple projects (reverse of owned_by for graph traversal)"

  - from_node: Order
    to_node: Employee
    relation: placed_by
    join_type: INNER
    join_condition: "o.employee_id = e.id"
    notes: "An order was placed by an employee"

  - from_node: Order
    to_node: Product
    relation: contains
    join_type: INNER
    join_condition: "o.product_id = p.id"
    notes: "An order is for a specific product"
# ============================================================
# QUERY LIMITS
# Patterns that cannot be answered by this middleware.
# The LLM extraction layer reads these and returns
# question_type "other" when the question matches any entry.
# Add new unsupported patterns here — zero Python changes needed.
# ============================================================

query_limits:
  # no_filter_signals: when question contains one of these words AND asks about a numeric
  # or ranking field, the LLM must emit filters:{} (empty) and question_type:"comparison".
  # Never invent a filter value (e.g. 'exact', 'highest', '*') for these fields.
  # Read by _build_schema_context() → emits RANKING RULE in prompt.
  # To add a new superlative keyword: append to trigger_words. Zero Python changes.
  no_filter_signals:
    trigger_words:
      - "most"
      - "highest"
      - "lowest"
      - "least"
      - "best"
      - "worst"
      - "top"
      - "bottom"
      - "rank"
      - "ranked"
      - "ranking"
      - "earns the most"
      - "earns the least"
      - "most expensive"
      - "cheapest"
    applies_to_fields:
      - employee_salary
      - department_budget
      - project_budget
      - product_price
  unsupported_patterns:
    - description: "HAVING COUNT — more than N items per group"
      user_message: "I can't answer questions that need counting across groups (e.g. 'more than one project'). Try asking which projects a specific person is on instead."
      # linguistic_signals: exact substring matches against the normalised question.
      # Read by _build_schema_context() (prompt section) AND by the Python pre-filter
      # in extract_entities() (fast-path before LLM call). Add new surface forms here.
      linguistic_signals:
        - "more than one"
        - "more than two"
        - "more than three"
        - "assigned to multiple"
        - "working on more than"
        - "on more than"
        - "at least two"
        - "at least three"
    - description: "Subquery average comparison"
      user_message: "I can't compare individual values against a computed average. Try asking for the highest or lowest value directly instead."
      linguistic_signals:
        - "more than the average"
        - "higher than the average"
        - "above the average"
        - "below the average"
        - "cost more than average"
        - "earn more than average"
        - "paid more than average"
    - description: "Cross-record temporal comparison"
      user_message: "I can't compare dates or timelines across different records. Try asking about a specific project's start or end date instead."
      linguistic_signals:
        - "started after"
        - "completed before"
        - "after the last"
        - "before the first"
        - "since the last"
    - description: "Aggregation by group needing GROUP BY / COUNT"
      user_message: "I can't group and count across all records. Try asking about a specific supplier or category instead."
      linguistic_signals:
        - "which supplier provides the most"
        - "supplier with the most"
        - "most products by"
        - "count by supplier"
        - "how many products does each"
        - "rank the suppliers"
    - description: "Computed difference or delta between two aggregate values"
      user_message: "I can't compute differences between aggregate values like highest and lowest salary. Try asking for the highest salary and the lowest salary as two separate questions."
      linguistic_signals:
        - "difference between"
        - "salary difference"
        - "pay difference"
        - "how much more than"
        - "how much less than"
        - "gap between"
