models:
  fast_model: "phi3:mini"
  extraction_model: "phi3:mini"
  synthesis_model: "qwen2.5:1.5b"#shift to better model like phi3:mini or llama3:8b if has higher computaion power
  embed_model: "nomic-embed-text:latest"
  ollama_base_url: "http://localhost:11434"
  intent_temperature: 0.0
  synthesis_temperature: 0.1
  extraction_temperature: 0.0
  max_tokens_intent: 50
  max_tokens_extraction: 250
  max_tokens_synthesis: 350
  extraction_num_ctx: 2048
  synthesis_num_ctx: 2048
  keep_alive: "10m"
  ollama_timeout: 180
  semantic_cache_threshold: 0.92
  semantic_cache_max_entries: 500
